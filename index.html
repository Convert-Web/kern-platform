<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Nova — le réseau social pensé pour ce que tu vis vraiment. Fil d'actualité, stories, messagerie et lives, dans une expérience rapide et épurée.">
<title>Nova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --bg:#FBFBFA;
  --surface:#FFFFFF;
  --surface-raised:#FFFFFF;
  --ink:#14161A;
  --ink-soft:#5B5E66;
  --ink-faint:#9A9CA3;
  --border:#EAEAE6;
  --border-strong:#DCDCD7;
  --accent:#3D5AFE;
  --accent-ink:#2A3FD1;
  --accent-soft:#EEF0FF;
  --live:#FF6B4A;
  --live-soft:#FFF0EB;
  --success:#16A34A;
  --success-soft:#EAFBF1;
  --danger:#E0393E;
  --danger-soft:#FDEDED;
  --grad-story: linear-gradient(135deg, var(--accent) 0%, #7C6BFF 45%, var(--live) 100%);
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
  --radius-squircle: 30% / 30%;
  --shadow-xs: 0 1px 2px rgba(20,22,26,0.04);
  --shadow-sm: 0 2px 8px rgba(20,22,26,0.06);
  --shadow-md: 0 8px 24px rgba(20,22,26,0.08);
  --shadow-lg: 0 16px 48px rgba(20,22,26,0.14);
  --shadow-float: 0 20px 60px rgba(61,90,254,0.18);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --dur-fast: 150ms;
  --dur-base: 280ms;
  --dur-slow: 480ms;
  color-scheme: light;
}

*,*::before,*::after{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
}
h1,h2,h3,h4{
  font-family:'Inter Tight','Inter',sans-serif;
  letter-spacing:-0.03em;
  font-weight:700;
  line-height:1.1;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,textarea{font-family:inherit; color:inherit;}
a{color:inherit; text-decoration:none;}
img{display:block; max-width:100%;}
::selection{background:var(--accent); color:#fff;}

/* Scrollbar discrète */
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border-strong); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}

/* Squircle utilitaire */
.squircle{
  border-radius: 32%;
}
@supports (clip-path: url()){
  .squircle-svg{ display:none; }
}

/* Focus visible accessible */
:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:2px;
  border-radius:6px;
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
}

.sr-only{
  position:absolute; width:1px; height:1px; padding:0; margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* ============ AVATAR ============ */
.avatar-wrap{ position:relative; display:inline-flex; flex-shrink:0; }
.avatar{
  border-radius:32%;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:700; letter-spacing:0;
  flex-shrink:0;
}
.avatar-wrap.story-ring{ padding:3px; border-radius:36%; background:var(--grad-story); }
.avatar-wrap.story-ring .avatar{ border:2.5px solid #fff; }

/* ============ BUTTONS ============ */
.btn-primary{
  background:var(--ink); color:#fff;
  padding:13px 22px; border-radius:14px;
  font-weight:600; font-size:15px;
  transition:transform var(--dur-fast) var(--ease-out), background var(--dur-fast);
}
.btn-primary:hover{ background:var(--accent); }
.btn-primary:active{ transform:scale(0.97); }
.btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
.btn-block{ width:100%; }
.btn-accent{
  background:var(--accent); color:#fff;
  padding:11px 20px; border-radius:12px; font-weight:600; font-size:14px;
  transition:transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast);
  box-shadow:0 4px 14px rgba(61,90,254,0.28);
}
.btn-accent:hover{ box-shadow:0 6px 20px rgba(61,90,254,0.38); }
.btn-accent:active{ transform:scale(0.96); }
.btn-ghost{
  padding:10px 16px; border-radius:12px; font-weight:600; font-size:14px;
  color:var(--ink-soft); transition:background var(--dur-fast), color var(--dur-fast);
  display:inline-flex; align-items:center; gap:8px;
}
.btn-ghost svg{ width:16px; height:16px; }
.btn-ghost:hover{ background:var(--accent-soft); color:var(--accent); }

/* ============ AUTH SCREEN ============ */
.auth-screen{
  display:grid; grid-template-columns:1.15fr 1fr;
  min-height:100vh;
}
.auth-visual{
  position:relative;
  background:linear-gradient(160deg,#12142B 0%, #191B3D 55%, #241535 100%);
  display:flex; flex-direction:column; justify-content:center;
  padding:5vw 6vw; overflow:hidden;
}
.auth-visual-glow{
  position:absolute; width:900px; height:900px; border-radius:50%;
  background:radial-gradient(circle, rgba(61,90,254,0.35) 0%, rgba(255,107,74,0.12) 45%, transparent 70%);
  top:-20%; left:-15%;
  animation:driftGlow 18s ease-in-out infinite alternate;
  filter:blur(10px);
}
@keyframes driftGlow{
  0%{ transform:translate(0,0) scale(1); }
  100%{ transform:translate(6%, 8%) scale(1.12); }
}
.auth-brand{ position:relative; z-index:2; margin-bottom:64px; }
.auth-logo{
  font-family:'Inter Tight',sans-serif; font-size:52px; font-weight:800;
  letter-spacing:-0.04em; color:#fff; display:block; margin-bottom:18px;
}
.auth-tagline{
  font-size:20px; color:rgba(255,255,255,0.72); max-width:420px; line-height:1.5; font-weight:400;
}
.auth-cards{ position:relative; z-index:2; height:220px; }
.floaty-card{
  position:absolute; display:flex; align-items:center; gap:12px;
  background:rgba(255,255,255,0.08); backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.14);
  padding:14px 18px; border-radius:18px;
  animation:floatCard 6s ease-in-out infinite;
  box-shadow:0 20px 40px rgba(0,0,0,0.25);
}
.fc-1{ top:0; left:0; animation-delay:0s; }
.fc-2{ top:75px; left:180px; animation-delay:1.2s; }
.fc-3{ top:150px; left:20px; animation-delay:2.4s; }
@keyframes floatCard{
  0%,100%{ transform:translateY(0px); }
  50%{ transform:translateY(-14px); }
}
.fc-avatar{
  width:38px; height:38px; border-radius:32%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:700; font-size:13px;
}
.fc-text{ display:flex; flex-direction:column; }
.fc-text b{ color:#fff; font-size:14px; font-weight:600; }
.fc-text span{ color:rgba(255,255,255,0.6); font-size:12.5px; }

.auth-panel{
  display:flex; align-items:center; justify-content:center;
  padding:5vw; background:var(--bg);
}
.auth-form-wrap{ width:100%; max-width:380px; }
.auth-tabs{
  display:flex; gap:4px; background:var(--surface); border:1px solid var(--border);
  padding:4px; border-radius:14px; margin-bottom:32px;
}
.auth-tab{
  flex:1; padding:10px; border-radius:10px; font-weight:600; font-size:14px;
  color:var(--ink-faint); transition:all var(--dur-fast) var(--ease-out);
}
.auth-tab.active{ background:var(--ink); color:#fff; }
.auth-form.hidden{ display:none; }
.field{ display:block; margin-bottom:18px; }
.field span{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:7px; }
.field input{
  width:100%; padding:13px 16px; border-radius:12px; border:1.5px solid var(--border);
  font-size:15px; background:var(--surface); transition:border-color var(--dur-fast);
}
.field input:focus{ border-color:var(--accent); outline:none; }
.field-prefix{
  display:flex; align-items:center; border:1.5px solid var(--border); border-radius:12px;
  background:var(--surface); overflow:hidden; transition:border-color var(--dur-fast);
}
.field-prefix:focus-within{ border-color:var(--accent); }
.field-prefix span{ padding:0 0 0 16px; color:var(--ink-faint); font-weight:600; margin:0; }
.field-prefix input{ border:none; padding:13px 16px 13px 4px; }
.field-prefix input:focus{ outline:none; }
.auth-error{ color:var(--danger); font-size:13px; margin:-8px 0 14px; min-height:16px; }
.auth-note{ margin-top:24px; font-size:12.5px; color:var(--ink-faint); line-height:1.6; }

@media (max-width: 860px){
  .auth-screen{ grid-template-columns:1fr; }
  .auth-visual{ display:none; }
  .auth-panel{ padding:8vw 6vw; }
}

/* ============ APP SHELL ============ */
.shell{
  display:grid;
  grid-template-columns:248px minmax(0,600px) 1fr;
  justify-content:center;
  gap:32px;
  max-width:1240px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  align-items:start;
}
.side-nav{
  position:sticky; top:0; height:100vh;
  display:flex; flex-direction:column;
  padding:28px 8px 20px;
}
.brand-mark{
  font-family:'Inter Tight',sans-serif; font-size:24px; font-weight:800;
  letter-spacing:-0.03em; color:var(--ink); margin:0 0 28px 12px;
}
.nav-list{ display:flex; flex-direction:column; gap:2px; flex:1; }
.nav-item{
  display:flex; align-items:center; gap:14px;
  padding:12px 14px; border-radius:14px; position:relative;
  color:var(--ink); font-weight:500; font-size:16px;
  transition:background var(--dur-fast) var(--ease-out);
}
.nav-item:hover{ background:var(--surface); }
.nav-item.active{ font-weight:700; }
.nav-item.active .nav-icon{ color:var(--accent); }
.nav-icon{ width:24px; height:24px; display:flex; color:var(--ink); flex-shrink:0; }
.nav-icon svg{ width:100%; height:100%; }
.nav-dot{ position:absolute; left:30px; top:10px; width:8px; height:8px; border-radius:50%; background:var(--live); }
.composer-launch{
  display:flex; align-items:center; gap:10px; justify-content:center;
  background:var(--ink); color:#fff; padding:13px; border-radius:16px;
  font-weight:700; font-size:15px; margin:14px 4px 0;
  transition:background var(--dur-fast), transform var(--dur-fast);
}
.composer-launch:hover{ background:var(--accent); }
.composer-launch:active{ transform:scale(0.97); }
.composer-launch .nav-icon{ color:#fff; width:20px; height:20px; }
.side-nav-footer{ margin-top:16px; }
.mini-profile{
  display:flex; align-items:center; gap:10px; width:100%;
  padding:10px; border-radius:14px; transition:background var(--dur-fast);
}
.mini-profile:hover{ background:var(--surface); }
.mini-profile-text{ display:flex; flex-direction:column; align-items:flex-start; overflow:hidden; }
.mini-profile-text b{ font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:130px; }
.mini-profile-text span{ font-size:12.5px; color:var(--ink-faint); }

.main-col{ min-height:100vh; padding:24px 0 100px; }
.side-panel{ position:sticky; top:24px; padding:24px 0 24px 0; min-width:280px; }

@media (max-width: 1080px){
  .shell{ grid-template-columns:88px minmax(0,600px) 1fr; }
  .nav-label, .mini-profile-text{ display:none; }
  .nav-item{ justify-content:center; }
  .composer-launch .nav-label{ display:none; }
  .brand-mark{ text-align:center; margin-left:0; }
}
@media (max-width: 920px){
  .shell{ grid-template-columns:1fr; gap:0; padding:0; max-width:640px; }
  .side-nav{ display:none; }
  .side-panel{ display:none; }
  .main-col{ padding:16px 14px 90px; }
}

/* ============ TAB BAR MOBILE ============ */
.tab-bar{
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(255,255,255,0.92); backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  justify-content:space-around; z-index:40;
}
.tab-item{ width:26px; height:26px; color:var(--ink-faint); transition:color var(--dur-fast); }
.tab-item svg{ width:100%; height:100%; }
.tab-item.active{ color:var(--accent); }
@media (max-width: 920px){ .tab-bar{ display:flex; } }

/* ============ TOASTS ============ */
.toast-root{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; }
.toast{
  background:var(--ink); color:#fff; padding:12px 20px; border-radius:14px;
  font-size:14px; font-weight:500; box-shadow:var(--shadow-lg);
  opacity:0; transform:translateY(12px) scale(0.96);
  transition:all var(--dur-base) var(--ease-out);
}
.toast.show{ opacity:1; transform:translateY(0) scale(1); }
.toast-danger{ background:var(--danger); }
.toast-success{ background:var(--success); }
@media (max-width: 920px){ .toast-root{ bottom:80px; } }

/* ============ FEED ============ */
.feed-header{ padding:4px 4px 20px; }
.feed-header h1{ font-size:26px; }

.stories-row{
  display:flex; gap:14px; overflow-x:auto; padding:4px 4px 22px;
  scrollbar-width:none;
}
.stories-row::-webkit-scrollbar{ display:none; }
.story-add, .story-item{
  display:flex; flex-direction:column; align-items:center; gap:8px;
  flex-shrink:0; width:72px; text-align:center;
}
.story-add-avatar, .story-item-avatar{ position:relative; }
.story-plus{
  position:absolute; bottom:-2px; right:-2px; width:22px; height:22px;
  background:var(--accent); border:2.5px solid var(--bg); border-radius:50%;
  color:#fff; display:flex; align-items:center; justify-content:center;
}
.story-plus svg{ width:12px; height:12px; }
.story-add span, .story-item span{ font-size:12px; color:var(--ink-soft); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:72px; }

.quick-composer{
  display:flex; align-items:center; gap:14px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:14px 18px; margin-bottom:24px; cursor:text;
  transition:border-color var(--dur-fast), box-shadow var(--dur-fast);
}
.quick-composer:hover{ border-color:var(--border-strong); box-shadow:var(--shadow-xs); }
.quick-composer span{ color:var(--ink-faint); font-size:15px; }

.posts-list{ display:flex; flex-direction:column; gap:16px; }
.post-card{
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:18px 20px; animation:postIn var(--dur-slow) var(--ease-out);
}
@keyframes postIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
.post-head{ margin-bottom:12px; }
.post-author-link{ display:flex; align-items:center; gap:12px; }
.post-author-text{ display:flex; flex-direction:column; }
.post-author-text b{ font-size:15px; font-weight:700; }
.post-author-text span{ font-size:13px; color:var(--ink-faint); }
.post-text{ font-size:15.5px; line-height:1.6; white-space:pre-wrap; margin-bottom:12px; }
.post-image{ border-radius:16px; overflow:hidden; margin-bottom:12px; background:var(--bg); }
.post-image img{ width:100%; max-height:520px; object-fit:cover; }
.post-actions{ display:flex; align-items:center; gap:6px; padding-top:6px; border-top:1px solid var(--border); margin-top:4px; padding-top:10px; }
.post-action{
  display:flex; align-items:center; gap:7px; padding:8px 12px; border-radius:12px;
  color:var(--ink-soft); font-size:14px; font-weight:600;
  transition:background var(--dur-fast), color var(--dur-fast);
}
.post-action:hover{ background:var(--accent-soft); color:var(--accent); }
.post-action-icon{ width:20px; height:20px; display:flex; }
.post-action-icon svg{ width:100%; height:100%; }
.like-btn.liked{ color:var(--live); }
.like-btn.liked .post-action-icon{ color:var(--live); }
.post-action.pop{ animation:likePop 260ms var(--ease-spring); }
@keyframes likePop{ 0%{transform:scale(1);} 40%{transform:scale(1.18);} 100%{transform:scale(1);} }

.post-comments{ margin-top:10px; padding-top:12px; border-top:1px solid var(--border); }
.no-comments{ font-size:13.5px; color:var(--ink-faint); padding:6px 0 12px; }
.comment-item{ display:flex; gap:10px; align-items:flex-start; margin-bottom:10px; }
.comment-bubble{ background:var(--bg); border-radius:14px; padding:9px 14px; font-size:14px; line-height:1.4; }
.comment-bubble b{ font-weight:700; margin-right:5px; }
.comment-form{ display:flex; align-items:center; gap:10px; margin-top:8px; }
.comment-form input{
  flex:1; border:1px solid var(--border); border-radius:20px; padding:9px 16px;
  font-size:14px; background:var(--bg);
}
.comment-form input:focus{ outline:none; border-color:var(--accent); }
.icon-btn{
  width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  color:var(--ink-soft); transition:background var(--dur-fast), color var(--dur-fast); flex-shrink:0;
}
.icon-btn svg{ width:20px; height:20px; }
.icon-btn:hover{ background:var(--accent-soft); color:var(--accent); }

.skeleton-post{
  height:160px; border-radius:20px; background:linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
  background-size:200% 100%; animation:shimmer 1.4s infinite;
}
@keyframes shimmer{ 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

.empty-state{ text-align:center; padding:60px 20px; }
.empty-icon{ width:56px; height:56px; margin:0 auto 18px; color:var(--ink-faint); }
.empty-icon svg{ width:100%; height:100%; }
.empty-state h3{ font-size:19px; margin-bottom:8px; }
.empty-state p{ color:var(--ink-soft); font-size:14.5px; max-width:340px; margin:0 auto 22px; line-height:1.5; }

/* ============ MODAL ============ */
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,22,26,0.5); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  opacity:0; transition:opacity var(--dur-base) var(--ease-out);
}
.modal-overlay.show{ opacity:1; }
.modal-box{
  background:var(--surface); border-radius:24px; width:100%; max-width:480px;
  max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-lg);
  transform:scale(0.94) translateY(10px); transition:transform var(--dur-base) var(--ease-spring);
}
.modal-overlay.show .modal-box{ transform:scale(1) translateY(0); }
.modal-wide{ max-width:640px; }
.modal-header{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px; border-bottom:1px solid var(--border); }
.modal-header h3{ font-size:17px; }
.composer-body{ padding:20px; }
.composer-author{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.composer-author b{ display:block; font-size:14.5px; }
.composer-visibility{ font-size:12.5px; color:var(--ink-faint); }
.composer-textarea{
  width:100%; border:none; resize:none; font-size:17px; line-height:1.5;
  min-height:100px; background:transparent;
}
.composer-textarea:focus{ outline:none; }
.composer-image-preview{ position:relative; margin-top:12px; border-radius:16px; overflow:hidden; }
.composer-image-preview img{ width:100%; max-height:320px; object-fit:cover; }
.remove-image-btn{
  position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%;
  background:rgba(20,22,26,0.6); color:#fff; display:flex; align-items:center; justify-content:center;
}
.remove-image-btn svg{ width:16px; height:16px; }
.modal-footer{ display:flex; align-items:center; gap:12px; padding:14px 20px; border-top:1px solid var(--border); }
.composer-count{ margin-left:auto; font-size:13px; color:var(--ink-faint); }

/* ============ COMPOSER MULTI-IMAGES ============ */
.composer-image-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:12px; }
.composer-image-grid:empty{ display:none; }
.composer-image-cell{ position:relative; border-radius:14px; overflow:hidden; aspect-ratio:1; background:var(--bg); }
.composer-image-cell img{ width:100%; height:100%; object-fit:cover; }

/* ============ POST IMAGE GRID ============ */
.post-image-grid{ display:grid; gap:4px; border-radius:16px; overflow:hidden; margin-bottom:12px; }
.post-image-count-1{ grid-template-columns:1fr; }
.post-image-count-1 .post-image-cell{ aspect-ratio:16/10; }
.post-image-count-2{ grid-template-columns:1fr 1fr; }
.post-image-count-2 .post-image-cell{ aspect-ratio:1; }
.post-image-count-3{ grid-template-columns:2fr 1fr; }

/* ======================================================================
   NOVA — CŒUR APPLICATIF
   Stockage persistant réel via window.storage (clé-valeur, par utilisateur).
   Aucune donnée n'est simulée : posts, comptes, messages, likes, stories
   sont écrits/lus depuis le storage et survivent à un rechargement.
====================================================================== */

/* Nova fonctionne dans deux contextes :
   1) Comme artifact Claude.ai -> window.storage (persistance serveur réelle, multi-session).
   2) Comme fichier HTML autonome (ex. hébergé sur GitHub Pages) -> pas de window.storage,
      donc repli sur localStorage du navigateur : toujours une vraie persistance disque,
      simplement locale à cet appareil/navigateur plutôt que partagée entre appareils. */
const HAS_CLOUD_STORAGE = (typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function');
const LS_PREFIX = 'nova_ls::';

const LocalPolyfill = {
  get(key, shared){
    const raw = localStorage.getItem(LS_PREFIX+(shared?'shared::':'priv::')+key);
    return raw ? {key, value:raw, shared} : null;
  },
  set(key, value, shared){
    localStorage.setItem(LS_PREFIX+(shared?'shared::':'priv::')+key, value);
    return {key, value, shared};
  },
  delete(key, shared){
    localStorage.removeItem(LS_PREFIX+(shared?'shared::':'priv::')+key);
    return {key, deleted:true, shared};
  },
  list(prefix, shared){
    const scope = LS_PREFIX+(shared?'shared::':'priv::');
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.startsWith(scope)){
        const bare = k.slice(scope.length);
        if(!prefix || bare.startsWith(prefix)) keys.push(bare);
      }
    }
    return {keys, shared};
  }
};

const DB = {
  async get(key, shared=false){
    try{
      const r = HAS_CLOUD_STORAGE ? await window.storage.get(key, shared) : LocalPolyfill.get(key, shared);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  },
  async set(key, value, shared=false){
    try{
      if(HAS_CLOUD_STORAGE) await window.storage.set(key, JSON.stringify(value), shared);
      else LocalPolyfill.set(key, JSON.stringify(value), shared);
      return true;
    }catch(e){ console.error('DB.set failed', key, e); return false; }
  },
  async list(prefix, shared=false){
    try{
      const r = HAS_CLOUD_STORAGE ? await window.storage.list(prefix, shared) : LocalPolyfill.list(prefix, shared);
      return r ? r.keys : [];
    }catch(e){ return []; }
  },
  async del(key, shared=false){
    try{
      if(HAS_CLOUD_STORAGE) await window.storage.delete(key, shared);
      else LocalPolyfill.delete(key, shared);
      return true;
    }catch(e){ return false; }
  }
};

const AVATAR_COLORS = ['#3D5AFE','#FF6B4A','#16A34A','#7C6BFF','#E0393E','#0EA5A5','#E8A423','#D4457C'];

function pickAvatarColor(seed){
  let h = 0;
  for(let i=0;i<seed.length;i++) h = (h*31 + seed.charCodeAt(i)) % 997;
  return AVATAR_COLORS[h % AVATAR_COLORS.length];
}

async function handleTaken(handle){
  const idx = await DB.get('handles:index', true) || {};
  return !!idx[handle.toLowerCase()];
}

async function createAccount(name, handleRaw){
  const handle = handleRaw.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  if(!name.trim() || handle.length < 3){
    return {error:"Le nom et un pseudo d'au moins 3 caractères sont requis."};
  }
  if(await handleTaken(handle)){
    return {error:'Ce pseudo est déjà pris. Essaie-en un autre.'};
  }
  const id = uid('u');
  const user = {
    id, handle, name: name.trim(),
    bio:'', avatarColor: pickAvatarColor(handle),
    avatarEmoji: null,
    createdAt: Date.now(),
    following: [], followers: []
  };
  await DB.set('users:'+id, user);
  const idx = await DB.get('handles:index', true) || {};
  idx[handle] = id;
  await DB.set('handles:index', idx, true);
  localStorage.setItem('nova_session_uid', id);
  State.currentUser = user;
  return {user};
}

async function loginWithHandle(handleRaw){
  const handle = handleRaw.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
  const idx = await DB.get('handles:index', true) || {};
  const id = idx[handle];
  if(!id) return {error:"Aucun compte avec ce pseudo. Crée un compte d'abord."};
  const user = await DB.get('users:'+id);
  if(!user) return {error:'Compte introuvable.'};
  localStorage.setItem('nova_session_uid', id);
  State.currentUser = user;
  return {user};
}

function logout(){
  localStorage.removeItem('nova_session_uid');
  State.currentUser = null;
  stopPolling();
  render();
}

async function getUser(id){
  if(State.users[id]) return State.users[id];
  const u = await DB.get('users:'+id);
  if(u) State.users[id] = u;
  return u;
}

async function saveCurrentUser(patch){
  Object.assign(State.currentUser, patch);
  await DB.set('users:'+State.currentUser.id, State.currentUser);
  State.users[State.currentUser.id] = State.currentUser;
}

function timeAgo(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s < 60) return "à l'instant";
  const m = Math.floor(s/60);
  if(m < 60) return m+' min';
  const h = Math.floor(m/60);
  if(h < 24) return h+' h';
  const d = Math.floor(h/24);
  if(d < 7) return d+' j';
  return new Date(ts).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
}

function escapeHTML(str){
  const d = document.createElement('div');
  d.textContent = str == null ? '' : String(str);
  return d.innerHTML;
}



function toast(msg, kind='default'){
  const root = document.getElementById('toastRoot');
  if(!root) return;
  const el = document.createElement('div');
  el.className = 'toast toast-'+kind;
  el.textContent = msg;
  root.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=>el.remove(), 300); }, 2600);
}

let modalGeneration = 0;
function openModal(innerHTML, opts={}){
  modalGeneration++;
  const myGen = modalGeneration;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box ${opts.wide?'modal-wide':''}" role="dialog" aria-modal="true">
      ${innerHTML}
    </div>
  </div>`;
  const overlay = document.getElementById('modalOverlay');
  requestAnimationFrame(()=>overlay.classList.add('show'));
  overlay.addEventListener('click', (e)=>{ if(e.target === overlay) closeModal(); });
  document.addEventListener('keydown', escCloseOnce);
  return myGen;
}
function escCloseOnce(e){ if(e.key==='Escape'){ closeModal(); } }
function closeModal(){
  const genAtClose = modalGeneration;
  const overlay = document.getElementById('modalOverlay');
  if(!overlay) return;
  overlay.classList.remove('show');
  document.removeEventListener('keydown', escCloseOnce);
  setTimeout(()=>{
    if(modalGeneration === genAtClose){
      const root = document.getElementById('modalRoot');
      if(root) root.innerHTML='';
    }
  }, 200);
}

function extractHashtags(text){
  const matches = text.match(/#([a-zA-Z0-9_À-ÿ]{2,30})/g) || [];
  return [...new Set(matches.map(h => h.slice(1).toLowerCase()))];
}
function extractMentions(text){
  const matches = text.match(/@([a-z0-9_]{3,20})/gi) || [];
  return [...new Set(matches.map(m => m.slice(1).toLowerCase()))];
}
function richTextHTML(text){
  return escapeHTML(text)
    .replace(/#([a-zA-Z0-9_À-ÿ]{2,30})/g, '<a href="#hashtag/$1" class="rich-tag">#$1</a>')
    .replace(/@([a-z0-9_]{3,20})/gi, '<a href="#profile-by-handle/$1" class="rich-mention">@$1</a>');
}

async function resolveHandleRoute(handle){
  const idx = await DB.get('handles:index', true) || {};
  const id = idx[handle.toLowerCase()];
  if(id) location.hash = '#profile/'+id;

}

function openComposerModal(prefill={}){
  const isRepost = !!prefill.repostOf;
  openModal(`
    <div class="modal-header">
      <h3>${isRepost ? 'Republier avec un commentaire' : 'Nouvelle publication'}</h3>
      <button class="icon-btn" id="closeComposer" aria-label="Fermer">${iconX}</button>
    </div>
    <div class="composer-body">
      <div class="composer-author">
        ${avatarHTML(State.currentUser, 42)}
        <div>
          <b>${escapeHTML(State.currentUser.name)}</b>
          <span class="composer-visibility">Public</span>
        </div>
      </div>
      <textarea id="composerText" class="composer-textarea" placeholder="Quoi de neuf ? Utilise # pour un sujet, @ pour mentionner." maxlength="500" rows="4" autofocus></textarea>
      <div id="composerImagePreview" class="composer-image-grid"></div>
      ${isRepost ? `<div class="repost-embed-preview" id="repostEmbedPreview"></div>` : ''}
    </div>
    <div class="modal-footer">
      ${isRepost ? '' : `<label class="icon-btn" title="Ajouter des images">
        ${iconImage}
        <input type="file" accept="image/*" id="composerImageInput" hidden multiple>
      </label>`}
      <span class="composer-count" id="composerCount">500</span>
      <button class="btn-accent" id="submitPost">Publier</button>
    </div>
  `);
  document.getElementById('closeComposer').addEventListener('click', closeModal);
  const textarea = document.getElementById('composerText');
  const count = document.getElementById('composerCount');
  textarea.addEventListener('input', ()=>{ count.textContent = 500 - textarea.value.length; });
  textarea.focus();

  if(isRepost){
    renderRepostEmbedPreview(prefill.repostOf);
  }

  let images = [];
  const MAX_IMAGES = 4;
  function paintImagePreview(){
    const prev = document.getElementById('composerImagePreview');
    prev.innerHTML = images.map((src,i) => `
      <div class="composer-image-cell">
        <img src="${src}" alt="">
        <button class="remove-image-btn" data-idx="${i}">${iconX}</button>
      </div>
    `).join('');
    prev.querySelectorAll('.remove-image-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{ images.splice(Number(btn.dataset.idx),1); paintImagePreview(); });
    });
  }

  const imgInput = document.getElementById('composerImageInput');
  imgInput?.addEventListener('change', (e)=>{
    const files = Array.from(e.target.files || []);
    if(images.length + files.length > MAX_IMAGES){
      toast(`Maximum ${MAX_IMAGES} images par publication.`, 'danger');
    }
    const allowed = files.slice(0, MAX_IMAGES - images.length);
    let pending = allowed.length;
    allowed.forEach(file=>{
      if(file.size > 4*1024*1024){ toast(file.name+' est trop lourde (max 4 Mo).', 'danger'); pending--; return; }
      const reader = new FileReader();
      reader.onload = ()=>{
        images.push(reader.result);
        paintImagePreview();
      };
      reader.readAsDataURL(file);
    });
    imgInput.value = '';
  });

  document.getElementById('submitPost').addEventListener('click', async ()=>{
    const text = textarea.value.trim();
    if(!text && images.length===0 && !isRepost){ toast('Ajoute du texte ou une image.', 'danger'); return; }
    if(isRepost && !text){ toast('Ajoute un commentaire pour republier.', 'danger'); return; }
    const btn = document.getElementById('submitPost');
    btn.disabled = true; btn.textContent = 'Publication…';
    await createPost(text, images, isRepost ? prefill.repostOf : null);
    closeModal();
    toast(isRepost ? 'Republié.' : 'Publication partagée.');
    if(State.route === '#feed') renderFeedPage();
    else if(State.route === '#profile') renderProfilePage();
  });
}

async function createPost(text, images, repostOf=null){
  const id = uid('p');
  const hashtags = extractHashtags(text);
  const mentions = extractMentions(text);
  const post = {
    id, authorId: State.currentUser.id,
    text, images: images && images.length ? images : [],
    createdAt: Date.now(),
    reactions: {}, // { userId: emoji }
    comments: [],
    hashtags, mentions,
    repostOf: repostOf ? repostOf.id : null
  };
  await DB.set('posts:'+id, post);
  const index = await DB.get('feed:index', true) || [];
  index.unshift(id);
  await DB.set('feed:index', index, true);

  for(const tag of hashtags){
    const tagIndex = await DB.get('hashtag:'+tag, true) || [];
    tagIndex.unshift(id);
    await DB.set('hashtag:'+tag, tagIndex, true);
  }
  for(const handle of mentions){
    const idx = await DB.get('handles:index', true) || {};
    const mentionedId = idx[handle];
    if(mentionedId && mentionedId !== State.currentUser.id){
      await pushNotification(mentionedId, 'mention', State.currentUser.id, "t'a mentionné dans une publication");
    }
  }
  if(repostOf && repostOf.authorId !== State.currentUser.id){
    await pushNotification(repostOf.authorId, 'repost', State.currentUser.id, 'a republié ta publication');
  }
  return post;
}

const REACTIONS = [
  {emoji:'❤️', key:'love', label:'J\'adore'},
  {emoji:'😂', key:'haha', label:'Ça me fait rire'},
  {emoji:'😮', key:'wow', label:'Waouh'},
  {emoji:'😢', key:'sad', label:'Triste'},
  {emoji:'👏', key:'clap', label:'Bravo'},
];

function normalizePost(post){
  // Rétrocompatibilité avec l'ancien schéma (likes: [userId]) si présent en storage
  if(!post.reactions){
    post.reactions = {};
    (post.likes || []).forEach(uid => post.reactions[uid] = 'love');
  }
  if(!post.images){
    post.images = post.imageDataUrl ? [post.imageDataUrl] : [];
  }
  if(!post.comments) post.comments = [];
  if(post.repostOf === undefined) post.repostOf = null;
  return post;
}

function reactionCounts(post){
  const counts = {};
  Object.values(post.reactions).forEach(k => counts[k] = (counts[k]||0)+1);
  return counts;
}
function totalReactions(post){ return Object.keys(post.reactions).length; }
function topReactionEmojis(post){
  const counts = reactionCounts(post);
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3)
    .map(([key])=> REACTIONS.find(r=>r.key===key)?.emoji || '❤️');
}

  function openPicker(){
    document.querySelectorAll('.reaction-picker').forEach(p => { if(p !== picker) p.hidden = true; });
    picker.hidden = false;

  reactionWrap.addEventListener('mouseenter', ()=>{ clearTimeout(hoverTimer); openPicker(); });
  reactionWrap.addEventListener('mouseleave', ()=>{ hoverTimer = setTimeout(closePicker, 250); });
  reactBtn.addEventListener('touchstart', ()=>{ longPressTimer = setTimeout(openPicker, 380); }, {passive:true});
  reactBtn.addEventListener('touchend', ()=>{ clearTimeout(longPressTimer); });
  document.addEventListener('click', (e)=>{ if(!reactionWrap.contains(e.target)) closePicker(); });

  async function applyReaction(key){
    await setReaction(post, key);

    await applyReaction(myReaction ? null : 'love');

  picker.querySelectorAll('.reaction-option').forEach(opt=>{

async function setReaction(post, key){
  const uidCur = State.currentUser.id;
  const had = post.reactions[uidCur];
  if(had === key || key === null){
    delete post.reactions[uidCur];
  } else {
    post.reactions[uidCur] = key;
    if(!had && post.authorId !== uidCur){
      await pushNotification(post.authorId, 'like', State.currentUser.id, 'a réagi à ta publication');
    }
  }
  await DB.set('posts:'+post.id, post);
}

async function createStory(imageDataUrl, text){
  const id = uid('st');
  const now = Date.now();
  const story = {
    id, authorId: State.currentUser.id,
    imageDataUrl, text: text || '',
    createdAt: now, expiresAt: now + 24*60*60*1000,
    viewedBy: []
  };
  await DB.set('stories:'+id, story);
  const index = await DB.get('stories:index', true) || [];
  index.unshift(id);
  await DB.set('stories:index', index, true);
  return story;
}

async function getActiveStories(){
  const index = await DB.get('stories:index', true) || [];
  const all = (await Promise.all(index.map(id=>DB.get('stories:'+id)))).filter(Boolean);
  const now = Date.now();
  return all.filter(s => s.expiresAt > now);
}

async function renderStoriesRow(){
  const myGen = appGeneration;
  const row = document.getElementById('storiesRow');
  if(!row) return;

  const active = await getActiveStories();
  if(myGen !== appGeneration || !document.getElementById('storiesRow')) return;
  const byAuthor = {};
  for(const s of active){
    if(!byAuthor[s.authorId]) byAuthor[s.authorId] = [];
    byAuthor[s.authorId].push(s);
  }
  const myStories = byAuthor[State.currentUser.id] || [];

  let html = `<div class="story-add" id="storyAddBtn">
    <div class="story-add-avatar ${myStories.length ? 'story-ring' : ''}">
      ${avatarHTML(State.currentUser, 56)}
      <span class="story-plus">${iconPlus}</span>
    </div>
    <span>Ta story</span>
  </div>`;

  const otherAuthorIds = Object.keys(byAuthor).filter(id => id !== State.currentUser.id);
  const authorEntries = [];
  for(const aid of otherAuthorIds){
    const u = await getUser(aid);
    if(u) authorEntries.push({user:u, stories:byAuthor[aid]});
  }
  for(const entry of authorEntries){
    const allViewed = entry.stories.every(s => s.viewedBy.includes(State.currentUser.id));
    html += `
    <div class="story-item" data-author="${entry.user.id}">
      <div class="story-item-avatar ${allViewed ? '' : 'story-ring'}">
        ${avatarHTML(entry.user, 56)}
      </div>
      <span>${escapeHTML(entry.user.name.split(' ')[0])}</span>
    </div>`;
  }

  row.innerHTML = html;
  document.getElementById('storyAddBtn').addEventListener('click', ()=>{
    if(myStories.length) openStoryViewer([{user:State.currentUser, stories:myStories}], 0);
    else openStoryComposer();
  });
  row.querySelectorAll('.story-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const aid = el.dataset.author;
      const idx = authorEntries.findIndex(e=>e.user.id===aid);
      openStoryViewer(authorEntries, idx);
    });
  });
}

let storyViewerState = null;
function openStoryViewer(entries, startIndex){
  storyViewerState = {entries, authorIdx: startIndex, storyIdx: 0, timer: null};
  const root = document.getElementById('modalRoot');
  root.innerHTML = `<div class="story-viewer-overlay" id="storyViewerOverlay"></div>`;
  requestAnimationFrame(()=>document.getElementById('storyViewerOverlay').classList.add('show'));
  renderStoryViewerFrame();
}

function renderStoryViewerFrame(){
  const {entries, authorIdx, storyIdx} = storyViewerState;
  const entry = entries[authorIdx];
  const story = entry.stories[storyIdx];
  const overlay = document.getElementById('storyViewerOverlay');
  if(!overlay) return;

  if(!story.viewedBy.includes(State.currentUser.id)){
    story.viewedBy.push(State.currentUser.id);
    DB.set('stories:'+story.id, story);
  }

  overlay.innerHTML = `
    <div class="story-viewer-box">
      <div class="story-progress-row">
        ${entry.stories.map((s,i)=>`<div class="story-progress-bar"><div class="story-progress-fill" style="width:${i<storyIdx?'100%':i===storyIdx?'0%':'0%'}" data-active="${i===storyIdx}"></div></div>`).join('')}
      </div>
      <div class="story-viewer-head">
        ${avatarHTML(entry.user, 34)}
        <b>${escapeHTML(entry.user.name)}</b>
        <span>${timeAgo(story.createdAt)}</span>
        <button class="icon-btn story-close-btn" id="closeStoryViewer" aria-label="Fermer">${iconX}</button>
      </div>
      <img src="${story.imageDataUrl}" class="story-viewer-img" alt="">
      ${story.text ? `<p class="story-viewer-caption">${escapeHTML(story.text)}</p>` : ''}
      <div class="story-nav-zone story-nav-prev" id="storyPrev"></div>
      <div class="story-nav-zone story-nav-next" id="storyNext"></div>
    </div>
  `;

  const fillBar = overlay.querySelector(`.story-progress-fill[data-active="true"]`);
  requestAnimationFrame(()=>{ if(fillBar){ fillBar.style.transition='width 5s linear'; fillBar.style.width='100%'; } });
  clearTimeout(storyViewerState.timer);
  storyViewerState.timer = setTimeout(()=>advanceStory(1), 5000);

  document.getElementById('closeStoryViewer').addEventListener('click', closeStoryViewer);
  document.getElementById('storyPrev').addEventListener('click', ()=>advanceStory(-1));
  document.getElementById('storyNext').addEventListener('click', ()=>advanceStory(1));
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) closeStoryViewer(); });
}

function advanceStory(dir){
  clearTimeout(storyViewerState.timer);
  const {entries} = storyViewerState;
  let {authorIdx, storyIdx} = storyViewerState;
  storyIdx += dir;
  if(storyIdx < 0){
    authorIdx -= 1;
    if(authorIdx < 0){ closeStoryViewer(); return; }
    storyIdx = entries[authorIdx].stories.length - 1;
  } else if(storyIdx >= entries[authorIdx].stories.length){
    authorIdx += 1;
    if(authorIdx >= entries.length){ closeStoryViewer(); return; }
    storyIdx = 0;
  }
  storyViewerState.authorIdx = authorIdx;
  storyViewerState.storyIdx = storyIdx;
  renderStoryViewerFrame();
}

function closeStoryViewer(){
  if(storyViewerState) clearTimeout(storyViewerState.timer);
  const overlay = document.getElementById('storyViewerOverlay');
  if(overlay){
    overlay.classList.remove('show');
    setTimeout(()=>{ const root = document.getElementById('modalRoot'); if(root) root.innerHTML=''; }, 200);
  }
  storyViewerState = null;
  if(State.currentUser && State.route === '#feed') renderStoriesRow();
}

async function toggleFollow(targetUser){
  const me = State.currentUser;
  const isFollowing = me.following.includes(targetUser.id);
  if(isFollowing){
    me.following = me.following.filter(id=>id!==targetUser.id);
    targetUser.followers = targetUser.followers.filter(id=>id!==me.id);
  } else {
    me.following.push(targetUser.id);
    targetUser.followers.push(me.id);
    await pushNotification(targetUser.id, 'follow', me.id, 'a commencé à te suivre');
  }
  await saveCurrentUser({following: me.following});
  await DB.set('users:'+targetUser.id, targetUser);
  State.users[targetUser.id] = targetUser;
  return !isFollowing;
}

async function findOrCreateConversation(otherUserId){
  const myConvs = await DB.get('user:'+State.currentUser.id+':convs') || [];
  for(const cid of myConvs){
    const conv = await DB.get('conv:'+cid);
    if(conv && conv.members.includes(otherUserId)) return conv;
  }
  const id = uid('cv');
  const conv = {id, members:[State.currentUser.id, otherUserId], createdAt: Date.now()};
  await DB.set('conv:'+id, conv);
  await DB.set('conv:'+id+':messages', []);
  const mine = await DB.get('user:'+State.currentUser.id+':convs') || [];
  mine.push(id); await DB.set('user:'+State.currentUser.id+':convs', mine);
  const theirs = await DB.get('user:'+otherUserId+':convs') || [];
  theirs.push(id); await DB.set('user:'+otherUserId+':convs', theirs);
  return conv;
}

async function sendMessage(convId, text){
  const messages = await DB.get('conv:'+convId+':messages') || [];
  const msg = {id: uid('m'), senderId: State.currentUser.id, text, createdAt: Date.now()};
  messages.push(msg);
  await DB.set('conv:'+convId+':messages', messages);
  const conv = await DB.get('conv:'+convId);
  const otherId = conv.members.find(m=>m!==State.currentUser.id);
  if(otherId) await pushNotification(otherId, 'message', State.currentUser.id, 't\'a envoyé un message');
  return msg;
}

async function openThread(convId){
  State.activeConversationId = convId;
  document.querySelectorAll('.conv-list-item').forEach(el=>el.classList.toggle('active', el.dataset.conv===convId));
  const conv = await DB.get('conv:'+convId);
  const otherId = conv.members.find(m=>m!==State.currentUser.id);
  const otherUser = await getUser(otherId);
  const col = document.getElementById('threadCol');
  col.innerHTML = `
    <div class="thread-head">
      ${avatarHTML(otherUser, 38)}
      <b>${escapeHTML(otherUser?.name || '')}</b>
    </div>
    <div class="thread-messages" id="threadMessages"></div>

      <input type="text" id="threadInput" placeholder="Écrire un message…" maxlength="500" autocomplete="off">
      <button type="submit" class="icon-btn" aria-label="Envoyer">${iconSend}</button>
    </form>
  `;
  await paintThreadMessages(convId, otherUser);

  document.getElementById('threadComposer').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const input = document.getElementById('threadInput');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    await sendMessage(convId, text);
    await paintThreadMessages(convId, otherUser);
  });

  stopPolling();
  State.pollTimer = setInterval(async ()=>{
    if(State.route !== '#messages' || State.activeConversationId !== convId) return;
    await paintThreadMessages(convId, otherUser, true);
  }, 3000);
}

let lastPaintedCount = 0;
async function paintThreadMessages(convId, otherUser, isPoll=false){
  const messages = await DB.get('conv:'+convId+':messages') || [];
  if(isPoll && messages.length === lastPaintedCount) return;
  lastPaintedCount = messages.length;
  const box = document.getElementById('threadMessages');
  if(!box) return;
  const wasNearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 80;
  box.innerHTML = messages.length===0
    ? `<p class="no-comments" style="text-align:center;padding:30px 0">Dites bonjour à ${escapeHTML(otherUser?.name||'')} 👋</p>`
    : messages.map(m=>{
        const mine = m.senderId === State.currentUser.id;
        return `<div class="msg-row ${mine?'mine':''}">
          <div class="msg-bubble">${escapeHTML(m.text)}</div>
        </div>`;
      }).join('');
  if(wasNearBottom || !isPoll) box.scrollTop = box.scrollHeight;
}

async function renderSearchPage(){
  const myGen = appGeneration;
  const main = document.getElementById('mainCol');
  if(!main) return;
  main.innerHTML = `
    <div class="feed-header"><h1>Rechercher</h1></div>
    <div class="search-bar">
      ${iconSearch}
      <input type="text" id="searchInput" placeholder="Rechercher un compte ou un #hashtag…" autocomplete="off">
    </div>
    <div id="searchResults" class="search-results"></div>
  `;
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  input.focus();

  const idx = await DB.get('handles:index', true) || {};
  if(myGen !== appGeneration) return;
  const allIds = Object.values(idx);

  async function doSearch(q){
    q = q.trim().toLowerCase();
    if(!q){ results.innerHTML = ''; return; }

    if(q.startsWith('#')){
      const tag = q.slice(1);
      if(!tag){ results.innerHTML = ''; return; }
      results.innerHTML = `
        <a href="#hashtag/${encodeURIComponent(tag)}" class="search-result-item">
          <div class="hashtag-result-icon">${iconHashtag}</div>
          <div class="conv-list-text">
            <b>#${escapeHTML(tag)}</b>
            <span>Voir les publications</span>
          </div>
        </a>`;
      return;
    }

    const users = (await Promise.all(allIds.map(id=>getUser(id)))).filter(Boolean);
    if(myGen !== appGeneration || !document.getElementById('searchResults')) return;
    const matches = users.filter(u => u.id !== State.currentUser.id && (u.name.toLowerCase().includes(q) || u.handle.includes(q)));
    if(matches.length === 0){
      results.innerHTML = `<p class="no-comments" style="padding:20px 4px">Aucun résultat pour « ${escapeHTML(q)} ».</p>`;
      return;
    }
    results.innerHTML = matches.map(u => `
      <a href="#profile/${u.id}" class="search-result-item">
        ${avatarHTML(u, 48)}
        <div class="conv-list-text">
          <b>${escapeHTML(u.name)}</b>
          <span>@${escapeHTML(u.handle)}</span>
        </div>
      </a>
    `).join('');
  }

  let debounceTimer;
  input.addEventListener('input', ()=>{
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=>doSearch(input.value), 180);
  });
}

async function getOpenLives(){
  const index = await DB.get('lives:index', true) || [];
  const all = (await Promise.all(index.map(id=>DB.get('lives:'+id)))).filter(Boolean);

}

async function startLive(title){
  const id = uid('lv');
  const live = {id, hostId: State.currentUser.id, title: title || 'Live sans titre', startedAt: Date.now(), endedAt: null};
  await DB.set('lives:'+id, live);
  await DB.set('lives:'+id+':chat', []);
  const index = await DB.get('lives:index', true) || [];
  index.unshift(id);
  await DB.set('lives:index', index, true);
  return live;
}

    await endLive(liveId);
    stopPolling();
    closeModal();
    toast('Live terminé.');
    if(State.route === '#live') renderLivePage();
  });
  document.getElementById('liveChatForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const input = document.getElementById('liveChatInput');
    const text = input.value.trim();
    if(!text) return;
    input.value = '';
    const chat = await DB.get('lives:'+liveId+':chat') || [];
    chat.push({id:uid('lc'), authorId: State.currentUser.id, text, createdAt: Date.now()});
    await DB.set('lives:'+liveId+':chat', chat);
    await paintLiveChat(liveId);
  });

  await paintLiveChat(liveId);
  stopPolling();
  State.pollTimer = setInterval(async ()=>{
    if(!document.getElementById('liveChatMessages')) return;
    await paintLiveChat(liveId, true);
  }, 2500);
}

async function paintLiveChat(liveId, isPoll=false){
  const box = document.getElementById('liveChatMessages');
  if(!box) return;
  const chat = await DB.get('lives:'+liveId+':chat') || [];
  if(isPoll && liveRoomState && chat.length === liveRoomState.lastChatCount) return;
  if(liveRoomState) liveRoomState.lastChatCount = chat.length;
  if(chat.length === 0){
    box.innerHTML = `<p class="no-comments" style="text-align:center;padding:20px 0">Sois le premier à écrire dans le chat.</p>`;
    return;
  }
  const rows = [];
  for(const m of chat.slice(-60)){
    const u = await getUser(m.authorId);
    rows.push(`<div class="comment-item"><b style="font-size:13px;font-weight:700;margin-right:4px">${escapeHTML(u?.name||'')}</b><span style="font-size:13.5px">${escapeHTML(m.text)}</span></div>`);
  }
  box.innerHTML = rows.join('');
  box.scrollTop = box.scrollHeight;
}
</script>
